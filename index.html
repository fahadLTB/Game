<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Angry Birds Clone - Levels</title>
<style>
  body { margin:0; background:#87CEEB; display:flex; flex-direction:column; align-items:center; font-family:Arial; }
  canvas { background:#87CEEB; border:2px solid #000; margin-top:20px; }
  h1 { margin-top:20px; color:#333; }
  #score, #level { font-size:20px; margin-top:10px; }
  button { margin-top:10px; padding:5px 10px; font-size:16px; cursor:pointer; }
</style>
</head>
<body>
<h1>🐦 Angry Birds Clone</h1>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<div id="score">Score: 0</div>
<div id="level">Level: 1</div>
<button id="nextLevel" style="display:none;">Next Level</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let bird = {x:150, y:300, radius:15, vx:0, vy:0, isFlying:false};
let slingshot = {dragging:false};
let gravity = 0.5;
let score = 0;
let level = 1;
let blocks = [];

const levelData = [
  [{x:600,y:300,width:40,height:40},{x:640,y:300,width:40,height:40},{x:620,y:260,width:40,height:40}],
  [{x:580,y:300,width:40,height:40},{x:620,y:300,width:40,height:40},{x:660,y:300,width:40,height:40},{x:600,y:260,width:40,height:40},{x:640,y:260,width:40,height:40}],
  [{x:560,y:300,width:40,height:40},{x:600,y:300,width:40,height:40},{x:640,y:300,width:40,height:40},{x:680,y:300,width:40,height:40},{x:580,y:260,width:40,height:40},{x:620,y:260,width:40,height:40},{x:660,y:260,width:40,height:40}]
];

function loadLevel(lvl){
  blocks = JSON.parse(JSON.stringify(levelData[lvl-1])); // deep copy
  bird = {x:150, y:300, radius:15, vx:0, vy:0, isFlying:false};
  document.getElementById('level').innerText = "Level: " + lvl;
  document.getElementById('nextLevel').style.display = 'none';
}

loadLevel(level);

// Mouse controls
canvas.addEventListener('mousedown', e=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const dx = mx - bird.x;
  const dy = my - bird.y;
  if(Math.sqrt(dx*dx+dy*dy) < bird.radius) slingshot.dragging=true;
});

canvas.addEventListener('mousemove', e=>{
  if(slingshot.dragging){
    const rect = canvas.getBoundingClientRect();
    bird.x = e.clientX - rect.left;
    bird.y = e.clientY - rect.top;
  }
});

canvas.addEventListener('mouseup', e=>{
  if(slingshot.dragging){
    slingshot.dragging=false;
    bird.vx = (150 - bird.x)/5;
    bird.vy = (300 - bird.y)/5;
    bird.isFlying=true;
  }
});

// Draw and update game
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Bird
  ctx.beginPath();
  ctx.fillStyle='red';
  ctx.arc(bird.x,bird.y,bird.radius,0,Math.PI*2);
  ctx.fill();

  // Slingshot line
  if(slingshot.dragging){
    ctx.beginPath();
    ctx.moveTo(150,300);
    ctx.lineTo(bird.x,bird.y);
    ctx.strokeStyle='black';
    ctx.lineWidth=2;
    ctx.stroke();
  }

  // Blocks
  blocks.forEach(block=>{
    if(!block.hit){
      ctx.fillStyle='brown';
      ctx.fillRect(block.x,block.y,block.width,block.height);
    }
  });

  // Bird physics
  if(bird.isFlying){
    bird.vy += gravity;
    bird.x += bird.vx;
    bird.y += bird.vy;

    // Collision with blocks
    let allHit = true;
    blocks.forEach(block=>{
      if(!block.hit &&
         bird.x+bird.radius>block.x && bird.x-bird.radius<block.x+block.width &&
         bird.y+bird.radius>block.y && bird.y-bird.radius<block.y+block.height){
        block.hit=true;
        score+=10;
        document.getElementById('score').innerText = "Score: "+score;
        bird.vx*=-0.3;
        bird.vy*=-0.3;
      }
      if(!block.hit) allHit=false;
    });

    // Next level if all blocks destroyed
    if(allHit){
      bird.isFlying=false;
      document.getElementById('nextLevel').style.display='inline';
    }

    // Reset bird if offscreen
    if(bird.y>canvas.height || bird.x>canvas.width || bird.x<0){
      bird = {x:150, y:300, radius:15, vx:0, vy:0, isFlying:false};
    }
  }

  requestAnimationFrame(draw);
}

draw();

// Next level button
document.getElementById('nextLevel').addEventListener('click', ()=>{
  if(level<levelData.length){
    level++;
    loadLevel(level);
  } else {
    alert("🎉 You completed all levels!");
  }
});
</script>
</body>
</html>
