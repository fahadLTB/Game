<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2D Racing Game</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .game-container {
        position: relative;
        width: 400px;
        height: 600px;
        background: #333;
        overflow: hidden;
        border: 2px solid #fff;
    }
    .player {
        position: absolute;
        bottom: 20px;
        left: 175px;
        width: 50px;
        height: 100px;
        background: red;
        border-radius: 10px;
    }
    .obstacle {
        position: absolute;
        width: 50px;
        height: 100px;
        background: blue;
        border-radius: 10px;
    }
    .score-board {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        width: 400px;
    }
    button {
        background: #444;
        color: #fff;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background: #666;
    }
</style>
</head>
<body>

<h1>🏎️ 2D Racing Game</h1>
<div class="game-container" id="gameContainer">
    <div class="player" id="player"></div>
</div>
<div class="score-board">
    <span>Score: <span id="score">0</span></span>
    <button id="restartBtn">Restart</button>
</div>

<script>
    const player = document.getElementById("player");
    const gameContainer = document.getElementById("gameContainer");
    const scoreElement = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");

    let playerPosition = 175;
    let obstacles = [];
    let gameInterval;
    let obstacleSpeed = 5;
    let score = 0;
    let gameOver = false;

    // Player controls
    document.addEventListener("keydown", (e) => {
        if(e.key === "ArrowLeft" && playerPosition > 0) {
            playerPosition -= 20;
            player.style.left = playerPosition + "px";
        } else if(e.key === "ArrowRight" && playerPosition < 350) {
            playerPosition += 20;
            player.style.left = playerPosition + "px";
        }
    });

    // Create obstacles
    function createObstacle() {
        const obs = document.createElement("div");
        obs.classList.add("obstacle");
        obs.style.left = Math.floor(Math.random() * 8) * 50 + "px";
        obs.style.top = "-100px";
        gameContainer.appendChild(obs);
        obstacles.push(obs);
    }

    // Move obstacles
    function moveObstacles() {
        obstacles.forEach((obs, index) => {
            let top = parseInt(obs.style.top);
            top += obstacleSpeed;
            obs.style.top = top + "px";

            // Collision detection
            const obsLeft = parseInt(obs.style.left);
            const obsRight = obsLeft + 50;
            const playerLeft = playerPosition;
            const playerRight = playerPosition + 50;
            const playerTop = 500;
            const playerBottom = 600;

            if(top + 100 > playerTop && top < playerBottom &&
               obsRight > playerLeft && obsLeft < playerRight) {
                endGame();
            }

            // Remove obstacle and increment score
            if(top > 600) {
                obs.remove();
                obstacles.splice(index, 1);
                score++;
                scoreElement.innerText = score;

                // Optional: gradually increase speed
                if(score % 5 === 0) obstacleSpeed += 1;
            }
        });
    }

    // Game loop
    function startGame() {
        gameInterval = setInterval(() => {
            if(Math.random() < 0.02) createObstacle();
            moveObstacles();
        }, 30);
    }

    function endGame() {
        clearInterval(gameInterval);
        gameOver = true;
        alert("💥 Game Over! Your score: " + score);
    }

    restartBtn.addEventListener("click", () => {
        if(gameOver) {
            obstacles.forEach(obs => obs.remove());
            obstacles = [];
            playerPosition = 175;
            player.style.left = playerPosition + "px";
            score = 0;
            scoreElement.innerText = score;
            obstacleSpeed = 5;
            gameOver = false;
            startGame();
        }
    });

    // Start automatically
    startGame();
</script>

</body>
</html>
