<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

#ui {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    z-index: 10;
}

#ui h2 {
    margin: 0;
}
</style>
</head>

<body>

<div id="ui">
    <h2>Speed: <span id="speed">0</span></h2>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script type="module">
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.128/examples/jsm/loaders/GLTFLoader.js";

let scene, camera, renderer;
let playerCar;
let traffic = [];
let speed = 0.3;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // sky

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 6);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // LIGHT
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10,10,5);
    scene.add(light);

    scene.add(new THREE.AmbientLight(0xaaaaaa));

    // ROAD
    const roadGeo = new THREE.PlaneGeometry(10, 500);
    const roadMat = new THREE.MeshStandardMaterial({color:0x222222});
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI/2;
    road.position.z = -200;
    scene.add(road);

    // CLOUDS
    for (let i=0;i<20;i++){
        const cloudGeo = new THREE.SphereGeometry(1,16,16);
        const cloudMat = new THREE.MeshStandardMaterial({color:0xffffff});
        let cloud = new THREE.Mesh(cloudGeo, cloudMat);
        cloud.position.set(Math.random()*30-15, Math.random()*10+5, Math.random()*-200);
        scene.add(cloud);
    }

    // LOAD REAL CAR
    const loader = new GLTFLoader();

    loader.load(
        "https://threejs.org/examples/models/gltf/Flamingo.glb", // temporary model (replaceable)
        (gltf) => {
            playerCar = gltf.scene;
            playerCar.scale.set(0.01,0.01,0.01);
            playerCar.position.set(0,0,0);
            scene.add(playerCar);
        }
    );

    // TRAFFIC CARS (simple but looks like cars)
    for (let i=0;i<10;i++){
        const geo = new THREE.BoxGeometry(1,0.5,2);
        const mat = new THREE.MeshStandardMaterial({color:Math.random()*0xffffff});
        let car = new THREE.Mesh(geo, mat);
        car.position.set((Math.random()*6-3),0.25,-Math.random()*200);
        scene.add(car);
        traffic.push(car);
    }

    // CONTROLS
    document.addEventListener("keydown",(e)=>{
        if(!playerCar) return;
        if(e.key==="ArrowLeft") playerCar.position.x -= 0.5;
        if(e.key==="ArrowRight") playerCar.position.x += 0.5;
    });

    window.addEventListener("resize", ()=>{
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function animate() {
    requestAnimationFrame(animate);

    speed += 0.0005;

    // MOVE TRAFFIC
    traffic.forEach(car=>{
        car.position.z += speed*5;

        if(car.position.z > 5){
            car.position.z = -200;
            car.position.x = Math.random()*6-3;
        }

        // COLLISION
        if(playerCar){
            if(Math.abs(car.position.z - playerCar.position.z) < 1.5 &&
               Math.abs(car.position.x - playerCar.position.x) < 1){
                alert("💥 Crash! Refresh to restart");
                location.reload();
            }
        }
    });

    // CAMERA FOLLOW
    if(playerCar){
        camera.position.x = playerCar.position.x;
    }

    document.getElementById("speed").innerText = speed.toFixed(2);

    renderer.render(scene, camera);
}
</script>

</body>
</html>
