<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Racing Game</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial;
        background: black;
    }

    #score {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        font-size: 20px;
        z-index: 10;
    }

    #controls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 14px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div id="score">Speed: 0</div>
<div id="controls">Use ← → Arrow Keys to Move</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let car, road;
let speed = 0.2;
let maxSpeed = 1.5;
let moveLeft = false;
let moveRight = false;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 10, 50);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x404040);
    scene.add(ambient);

    // Road
    const roadGeometry = new THREE.PlaneGeometry(10, 200);
    const roadMaterial = new THREE.MeshStandardMaterial({color: 0x333333});
    road = new THREE.Mesh(roadGeometry, roadMaterial);
    road.rotation.x = -Math.PI / 2;
    road.position.z = -50;
    scene.add(road);

    // Lane lines (for realism)
    const lineGeometry = new THREE.PlaneGeometry(0.2, 200);
    const lineMaterial = new THREE.MeshBasicMaterial({color: 0xffffff});

    for (let i = -2; i <= 2; i += 2) {
        let line = new THREE.Mesh(lineGeometry, lineMaterial);
        line.rotation.x = -Math.PI / 2;
        line.position.set(i, 0.01, -50);
        scene.add(line);
    }

    // Car
    const carGeometry = new THREE.BoxGeometry(1, 0.5, 2);
    const carMaterial = new THREE.MeshStandardMaterial({color: 0xff0000});
    car = new THREE.Mesh(carGeometry, carMaterial);
    car.position.y = 0.25;
    scene.add(car);

    // Controls
    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") moveLeft = true;
        if (e.key === "ArrowRight") moveRight = true;
    });

    document.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft") moveLeft = false;
        if (e.key === "ArrowRight") moveRight = false;
    });

    // Resize handling
    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function animate() {
    requestAnimationFrame(animate);

    // Increase speed gradually
    if (speed < maxSpeed) speed += 0.0005;

    // Move road
    road.position.z += speed;
    if (road.position.z > 0) {
        road.position.z = -50;
    }

    // Car movement
    if (moveLeft && car.position.x > -3) {
        car.position.x -= 0.1;
    }
    if (moveRight && car.position.x < 3) {
        car.position.x += 0.1;
    }

    // Slight tilt effect (realistic feel)
    car.rotation.z = -car.position.x * 0.1;

    // Update speed display
    document.getElementById("score").innerText = "Speed: " + speed.toFixed(2);

    renderer.render(scene, camera);
}
</script>

</body>
</html>
