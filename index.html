<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Racing</title>

<style>
body { margin:0; overflow:hidden; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">Speed: <span id="speed">0</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script type="module">
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.128/examples/jsm/loaders/GLTFLoader.js";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,6);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.DirectionalLight(0xffffff,1));
scene.add(new THREE.AmbientLight(0xffffff,0.6));

// ROAD TEXTURE
const tex = new THREE.TextureLoader().load("road.jpg");
tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
tex.repeat.set(1,20);

let road = new THREE.Mesh(
    new THREE.PlaneGeometry(10,200),
    new THREE.MeshStandardMaterial({map:tex})
);
road.rotation.x = -Math.PI/2;
road.position.z = -100;
scene.add(road);

// PLAYER CAR
let player;

const loader = new GLTFLoader();
loader.load("car.glb", (gltf)=>{
    player = gltf.scene;
    player.scale.set(0.02,0.02,0.02);
    scene.add(player);
});

// TRAFFIC
let traffic = [];
for(let i=0;i<6;i++){
    let car = new THREE.Mesh(
        new THREE.BoxGeometry(1,0.5,2),
        new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
    );
    car.position.set(Math.random()*6-3,0.3,-Math.random()*200);
    scene.add(car);
    traffic.push(car);
}

let speed = 0.2;

document.addEventListener("keydown", e=>{
    if(!player) return;
    if(e.key==="ArrowLeft") player.position.x -= 0.5;
    if(e.key==="ArrowRight") player.position.x += 0.5;
});

function animate(){
    requestAnimationFrame(animate);

    tex.offset.y += speed; // moving road

    traffic.forEach(c=>{
        c.position.z += speed*5;
        if(c.position.z > 5){
            c.position.z = -200;
            c.position.x = Math.random()*6-3;
        }

        if(player &&
           Math.abs(c.position.z - player.position.z)<1 &&
           Math.abs(c.position.x - player.position.x)<1){
            speed = 0.2;
        }
    });

    if(player){
        camera.position.x = player.position.x;
    }

    document.getElementById("speed").innerText = speed.toFixed(2);

    renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
