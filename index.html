<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Game</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #eee;
  }
  h1 {
    margin-top: 20px;
  }
  table {
    border-collapse: collapse;
    margin-top: 20px;
  }
  td {
    width: 60px;
    height: 60px;
    text-align: center;
    vertical-align: middle;
    font-size: 48px;
    cursor: pointer;
    user-select: none;
  }
  .white { background: #f0d9b5; }
  .black { background: #b58863; }
  .highlight { outline: 3px solid yellow; }
</style>
</head>
<body>
<h1>♟️ Chess Game ♟️</h1>
<table id="board"></table>
<script>
const boardElement = document.getElementById("board");
let selectedCell = null;
let turn = 'w'; // w=white, b=black

// Initial chess setup using Unicode pieces
let board = [
  ['♜','♞','♝','♛','♚','♝','♞','♜'],
  ['♟','♟','♟','♟','♟','♟','♟','♟'],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['♙','♙','♙','♙','♙','♙','♙','♙'],
  ['♖','♘','♗','♕','♔','♗','♘','♖']
];

function renderBoard() {
  boardElement.innerHTML = '';
  for(let i=0;i<8;i++){
    const row = document.createElement('tr');
    for(let j=0;j<8;j++){
      const cell = document.createElement('td');
      cell.className = (i+j)%2===0 ? 'white' : 'black';
      cell.textContent = board[i][j];
      cell.dataset.row = i;
      cell.dataset.col = j;
      cell.addEventListener('click', onCellClick);
      row.appendChild(cell);
    }
    boardElement.appendChild(row);
  }
}

function onCellClick(e) {
  const row = parseInt(e.target.dataset.row);
  const col = parseInt(e.target.dataset.col);
  const piece = board[row][col];

  // Select a piece
  if(selectedCell === null && piece !== '' && isTurn(piece)) {
    selectedCell = {row, col, piece};
    e.target.classList.add('highlight');
    return;
  }

  // Move piece
  if(selectedCell !== null) {
    board[row][col] = selectedCell.piece;
    board[selectedCell.row][selectedCell.col] = '';
    turn = turn === 'w' ? 'b' : 'w';
    selectedCell = null;
    renderBoard();
  }
}

// Check if piece belongs to current turn
function isTurn(piece){
  const whitePieces = '♔♕♖♗♘♙';
  const blackPieces = '♚♛♜♝♞♟';
  return (turn==='w' && whitePieces.includes(piece)) || (turn==='b' && blackPieces.includes(piece));
}

renderBoard();
</script>
</body>
</html>
