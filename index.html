<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Angry Birds Clone</title>
<style>
  body { margin:0; background:#87CEEB; display:flex; flex-direction:column; align-items:center; font-family:Arial; }
  canvas { background:#87CEEB; border:2px solid #000; margin-top:20px; }
  h1 { margin-top:20px; color:#333; }
  #score { font-size:20px; margin-top:10px; }
</style>
</head>
<body>
<h1>🐦 Angry Birds Clone</h1>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<div id="score">Score: 0</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let bird = {x:150, y:300, radius:15, vx:0, vy:0, isFlying:false};
let slingshot = {dragging:false};
let gravity = 0.5;
let blocks = [
  {x:600,y:300,width:40,height:40,hit:false},
  {x:640,y:300,width:40,height:40,hit:false},
  {x:620,y:260,width:40,height:40,hit:false}
];
let score = 0;

// Mouse control
canvas.addEventListener('mousedown', e=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const dx = mx - bird.x;
  const dy = my - bird.y;
  if(Math.sqrt(dx*dx+dy*dy) < bird.radius){
    slingshot.dragging=true;
  }
});

canvas.addEventListener('mousemove', e=>{
  if(slingshot.dragging){
    const rect = canvas.getBoundingClientRect();
    bird.x = e.clientX - rect.left;
    bird.y = e.clientY - rect.top;
  }
});

canvas.addEventListener('mouseup', e=>{
  if(slingshot.dragging){
    slingshot.dragging=false;
    bird.vx = (150 - bird.x)/5;
    bird.vy = (300 - bird.y)/5;
    bird.isFlying=true;
  }
});

// Game loop
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw bird
  ctx.beginPath();
  ctx.fillStyle='red';
  ctx.arc(bird.x,bird.y,bird.radius,0,Math.PI*2);
  ctx.fill();

  // Draw slingshot line
  if(slingshot.dragging){
    ctx.beginPath();
    ctx.moveTo(150,300);
    ctx.lineTo(bird.x,bird.y);
    ctx.strokeStyle='black';
    ctx.lineWidth=2;
    ctx.stroke();
  }

  // Draw blocks
  blocks.forEach(block=>{
    if(!block.hit){
      ctx.fillStyle='brown';
      ctx.fillRect(block.x,block.y,block.width,block.height);
    }
  });

  // Bird physics
  if(bird.isFlying){
    bird.vy += gravity;
    bird.x += bird.vx;
    bird.y += bird.vy;

    // Collision with blocks
    blocks.forEach(block=>{
      if(!block.hit &&
         bird.x+bird.radius>block.x && bird.x-bird.radius<block.x+block.width &&
         bird.y+bird.radius>block.y && bird.y-bird.radius<block.y+block.height){
        block.hit=true;
        score+=10;
        document.getElementById('score').innerText = "Score: "+score;
        bird.vx*=-0.3;
        bird.vy*=-0.3;
      }
    });

    // Reset if bird falls off screen
    if(bird.y>canvas.height || bird.x>canvas.width || bird.x<0){
      bird = {x:150, y:300, radius:15, vx:0, vy:0, isFlying:false};
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
