<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  body { display:flex; flex-direction:column; align-items:center; background:#111; color:#fff; font-family:Arial; }
  h1 { margin-top:20px; }
  canvas { background:#222; margin-top:20px; border:2px solid #fff; }
  .score { margin-top:10px; font-size:20px; }
</style>
</head>
<body>
<h1>🐍 Snake Game</h1>
<canvas id="gameCanvas" width="400" height="400"></canvas>
<div class="score">Score: <span id="score">0</span></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const box = 20;
let snake = [{x: 8*box, y: 8*box}];
let food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
let score = 0;
let direction = null;
let game;

document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft' && direction!=='RIGHT') direction='LEFT';
  else if(e.key==='ArrowRight' && direction!=='LEFT') direction='RIGHT';
  else if(e.key==='ArrowUp' && direction!=='DOWN') direction='UP';
  else if(e.key==='ArrowDown' && direction!=='UP') direction='DOWN';
});

function draw(){
  ctx.fillStyle = '#222';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Draw snake
  for(let i=0;i<snake.length;i++){
    ctx.fillStyle = i===0 ? 'lime' : 'green';
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  // Draw food
  ctx.fillStyle = 'red';
  ctx.fillRect(food.x, food.y, box, box);

  // Move snake
  let head = {...snake[0]};
  if(direction==='LEFT') head.x -= box;
  if(direction==='RIGHT') head.x += box;
  if(direction==='UP') head.y -= box;
  if(direction==='DOWN') head.y += box;

  // Check collision with walls
  if(head.x<0 || head.x>=canvas.width || head.y<0 || head.y>=canvas.height || snake.some(s=>s.x===head.x && s.y===head.y)){
    clearInterval(game);
    alert('💥 Game Over! Score: '+score);
    return;
  }

  snake.unshift(head);

  // Check if ate food
  if(head.x===food.x && head.y===food.y){
    score++;
    document.getElementById('score').innerText=score;
    food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
  } else {
    snake.pop();
  }
}

game = setInterval(draw,100);
</script>
</body>
</html>
