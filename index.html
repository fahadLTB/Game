<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Racing Game</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87ceeb;
    font-family: Arial;
}

#ui {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    z-index: 10;
    font-size: 20px;
}
</style>
</head>

<body>

<div id="ui">Speed: <span id="speed">0</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let playerCar;
let traffic = [];
let road;
let speed = 0.3;

init();
animate();

function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 6);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // LIGHT
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10,10,5);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    // ROAD
    const roadGeo = new THREE.PlaneGeometry(10, 400);
    const roadMat = new THREE.MeshStandardMaterial({color:0x333333});
    road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI/2;
    road.position.z = -150;
    scene.add(road);

    // LANE MARKINGS
    for(let i=0;i<20;i++){
        let line = new THREE.Mesh(
            new THREE.PlaneGeometry(0.2, 4),
            new THREE.MeshBasicMaterial({color:0xffffff})
        );
        line.rotation.x = -Math.PI/2;
        line.position.set(0, 0.01, -i*20);
        scene.add(line);
    }

    // PLAYER CAR (better shape)
    const car = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.4, 2.5),
        new THREE.MeshStandardMaterial({color:0xff0000})
    );

    const top = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.4, 1.2),
        new THREE.MeshStandardMaterial({color:0xaa0000})
    );
    top.position.y = 0.4;

    car.add(body);
    car.add(top);

    car.position.y = 0.3;
    scene.add(car);
    playerCar = car;

    // TRAFFIC
    for(let i=0;i<8;i++){
        let tcar = new THREE.Mesh(
            new THREE.BoxGeometry(1,0.5,2),
            new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
        );
        tcar.position.set((Math.random()*6-3), 0.25, -Math.random()*200);
        scene.add(tcar);
        traffic.push(tcar);
    }

    // CONTROLS
    document.addEventListener("keydown", e=>{
        if(e.key==="ArrowLeft") playerCar.position.x -= 0.5;
        if(e.key==="ArrowRight") playerCar.position.x += 0.5;
    });

    window.addEventListener("resize", ()=>{
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function animate(){
    requestAnimationFrame(animate);

    speed += 0.0005;

    // MOVE ROAD
    road.position.z += speed*5;
    if(road.position.z > 0){
        road.position.z = -150;
    }

    // MOVE TRAFFIC
    traffic.forEach(car=>{
        car.position.z += speed*5;

        if(car.position.z > 5){
            car.position.z = -200;
            car.position.x = Math.random()*6-3;
        }

        // COLLISION
        if(Math.abs(car.position.z - playerCar.position.z) < 1.5 &&
           Math.abs(car.position.x - playerCar.position.x) < 1){
            alert("💥 Crash!");
            location.reload();
        }
    });

    // CAMERA FOLLOW
    camera.position.x = playerCar.position.x;

    document.getElementById("speed").innerText = speed.toFixed(2);

    renderer.render(scene, camera);
}
</script>

</body>
</html>
